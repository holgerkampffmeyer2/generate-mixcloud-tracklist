name: AI Harness Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: markmishaev76/ai-harness-scorecard@v1
        id: scorecard
        with:
          output-file: scorecard-report.md
          badge-file: scorecard-badge.json
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scorecard-report.md scorecard-badge.json
          git commit -m "Update AI scorecard" || echo "No changes"
          git push